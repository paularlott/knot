name = "update_space"
description = "Update properties of an existing space (description, shell, or name)."
keywords = ["update", "space", "modify", "edit", "configure", "rename"]
visibility = "discoverable"

[parameters.name]
type = "string"
description = "Name of the space to update"
required = true

[parameters.description]
type = "string"
description = "New description for the space"
required = false

[parameters.shell]
type = "string"
description = "New preferred shell (bash, zsh, fish, sh)"
required = false
