description = "Update properties of an existing space (name, description, shell, or custom fields)."
keywords = ["update", "space", "modify", "edit", "configure", "rename", "custom", "field"]
requires_approval = true
discoverable = true

[[parameters]]
name = "name"
type = "string"
description = "Name of the space to update"
required = true

[[parameters]]
name = "new_name"
type = "string"
description = "New name for the space"
required = false

[[parameters]]
name = "description"
type = "string"
description = "New description for the space"
required = false

[[parameters]]
name = "shell"
type = "string"
description = "New preferred shell (bash, zsh, fish, sh)"
required = false

[[parameters]]
name = "custom_fields"
type = "array:string"
description = "Optional custom field values as name=value strings, for example [\"ENV=prod\", \"ROLE=api\"]"
required = false
