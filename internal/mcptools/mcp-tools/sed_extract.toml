description = "Extract regex capture groups from a file (or files under a directory) in a running space. Returns each match with its file, line, text, and capture groups. Read-only — does not modify files."
keywords = ["sed", "extract", "capture", "groups", "parse", "regex", "scan", "grep", "match"]
discoverable = true

[[parameters]]
name = "name"
type = "string"
description = "Name or ID of the space"
required = true

[[parameters]]
name = "pattern"
type = "string"
description = "Regular expression with capture groups (Go regexp syntax)"
required = true

[[parameters]]
name = "path"
type = "string"
description = "File or directory to search (relative to the space workdir)"
required = true

[[parameters]]
name = "recursive"
type = "bool"
description = "Recurse into subdirectories when path is a directory (default false)"
required = false

[[parameters]]
name = "ignore_case"
type = "bool"
description = "Case-insensitive matching (default false)"
required = false

[[parameters]]
name = "glob"
type = "string"
description = "Only search files matching this glob pattern, e.g. '*.py'"
required = false
