name = "write_file"
description = "Write content to a file in a running space."
keywords = ["write", "file", "create", "save", "edit", "content", "text", "document"]

[parameters.space_name]
type = "string"
description = "Name of the space to write to"
required = true

[parameters.file_path]
type = "string"
description = "File path in the space of the file to write"
required = true

[parameters.content]
type = "string"
description = "Content to write"
required = true
