description = "Write content to a file in a running space. Default mode is overwrite (replaces the file). Use mode=append to add to the end, or mode=prepend to add to the beginning of an existing file."
keywords = ["write", "file", "create", "save", "edit", "content", "text", "document", "append", "prepend"]
requires_approval = true

[[parameters]]
name = "name"
type = "string"
description = "Name of the space to write to"
required = true

[[parameters]]
name = "file_path"
type = "string"
description = "Path to the file within the space (e.g., app/config.json)"
required = true

[[parameters]]
name = "content"
type = "string"
description = "Content to write to the file"
required = true

[[parameters]]
name = "mode"
type = "string"
description = "Write mode: overwrite (default), append, or prepend"
required = false
