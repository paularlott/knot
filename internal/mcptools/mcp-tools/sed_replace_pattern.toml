description = "Replace every regex match in a file (or files under a directory) in a running space. Capture groups may be referenced in the replacement as ${1}, ${2}, or ${name}. Files are modified in place using an atomic temp-file + rename. Returns the number of files modified."
keywords = ["sed", "replace", "regex", "substitute", "edit", "modify", "capture", "in-place", "patch", "refactor"]
discoverable = true
requires_approval = true

[[parameters]]
name = "name"
type = "string"
description = "Name or ID of the space"
required = true

[[parameters]]
name = "pattern"
type = "string"
description = "Regular expression pattern (Go regexp syntax)"
required = true

[[parameters]]
name = "new"
type = "string"
description = "Replacement string (may reference capture groups as ${1}, ${name})"
required = true

[[parameters]]
name = "path"
type = "string"
description = "File or directory to modify (relative to the space workdir)"
required = true

[[parameters]]
name = "recursive"
type = "bool"
description = "Recurse into subdirectories when path is a directory (default false)"
required = false

[[parameters]]
name = "ignore_case"
type = "bool"
description = "Case-insensitive matching (default false)"
required = false

[[parameters]]
name = "glob"
type = "string"
description = "Only modify files matching this glob pattern, e.g. '*.py'"
required = false
