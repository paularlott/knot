description = "Create a new development space. Spaces are created in stopped state - use start_space to run them."
keywords = ["create", "space", "new", "environment", "development", "deploy", "instance"]

[[parameters]]
name = "name"
type = "string"
description = "Name of the space"
required = true

[[parameters]]
name = "template_name"
type = "string"
description = "Name of the template to use for this space"
required = true

[[parameters]]
name = "description"
type = "string"
description = "Optional description for the space"
required = false

[[parameters]]
name = "shell"
type = "string"
description = "Preferred shell (bash, zsh, fish, sh)"
required = false
