description = "Create a new development space, optionally with custom fields and started immediately."
keywords = ["create", "space", "new", "environment", "development", "deploy", "instance"]

[[parameters]]
name = "name"
type = "string"
description = "Name of the space"
required = true

[[parameters]]
name = "template_name"
type = "string"
description = "Name of the template to use for this space"
required = true

[[parameters]]
name = "description"
type = "string"
description = "Optional description for the space"
required = false

[[parameters]]
name = "shell"
type = "string"
description = "Preferred shell (bash, zsh, fish, sh)"
required = false

[[parameters]]
name = "custom_fields"
type = "array:string"
description = "Optional custom field values as name=value strings, for example [\"ENV=dev\", \"ROLE=api\"]"
required = false

[[parameters]]
name = "start_on_create"
type = "bool"
description = "Start the space immediately after it is created"
required = false
