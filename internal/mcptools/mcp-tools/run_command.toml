description = "Execute a command in a running space and capture its output."
keywords = ["run", "execute", "command", "shell", "terminal", "bash", "sh", "script", "output", "exec"]

[[parameters]]
name = "name"
type = "string"
description = "Name of the space to run command in"
required = true

[[parameters]]
name = "command"
type = "string"
description = "Command to execute (e.g., 'ls', 'npm', 'python')"
required = true

[[parameters]]
name = "arguments"
type = "array:string"
description = "Command arguments as an array (e.g., ['-la', '/tmp'])"
required = false

[[parameters]]
name = "timeout"
type = "int"
description = "Timeout in seconds (default: 30)"
required = false

[[parameters]]
name = "workdir"
type = "string"
description = "Working directory for command execution (e.g., '/app')"
required = false
