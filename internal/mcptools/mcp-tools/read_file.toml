name = "read_file"
description = "Read file contents from a running space."
keywords = ["read", "file", "content", "view", "open", "cat", "text", "document"]

[parameters.space_name]
type = "string"
description = "Name of the space to read the file from"
required = true

[parameters.file_path]
type = "string"
description = "File path in the space of the file to read"
required = true
