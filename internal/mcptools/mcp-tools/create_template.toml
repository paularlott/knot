name = "create_template"
description = "Create a new space template."
keywords = ["create", "template", "new", "docker", "nomad", "podman", "platform", "job", "specification", "blueprint"]

[parameters.name]
type = "string"
description = "Template name"
required = true

[parameters.platform]
type = "string"
description = "Platform type ('manual', 'docker', 'podman', or 'nomad')"
required = true

[parameters.job]
type = "string"
description = "Job specification (not required for manual platform)"
required = false

[parameters.description]
type = "string"
description = "Template description"
required = false

[parameters.volumes]
type = "string"
description = "Volume specification"
required = false

[parameters.compute_units]
type = "number"
description = "Compute units required"
required = false

[parameters.storage_units]
type = "number"
description = "Storage units required"
required = false

[parameters.with_terminal]
type = "boolean"
description = "Enable terminal access"
required = false

[parameters.with_vscode_tunnel]
type = "boolean"
description = "Enable VSCode tunnel"
required = false

[parameters.with_code_server]
type = "boolean"
description = "Enable code server"
required = false

[parameters.with_ssh]
type = "boolean"
description = "Enable SSH access"
required = false

[parameters.with_run_command]
type = "boolean"
description = "Enable command execution and file operations (read/write/copy) in the space"
required = false

[parameters.active]
type = "boolean"
description = "Template active status"
required = false

[parameters.icon_url]
type = "string"
description = "Icon URL. Use list_icons to find available URLs"
required = false

[parameters.groups]
type = "array"
description = "Group IDs that can use this template. Use list_groups for UUIDs"
required = false

[parameters.zones]
type = "array"
description = "Zone names where template should be available"
required = false

[parameters.schedule_enabled]
type = "boolean"
description = "Enable schedule restrictions"
required = false

[parameters.schedule]
type = "array"
description = "Array of 7 schedule objects (Sunday=0 to Saturday=6). Times in '3:04pm' format"
required = false

[parameters.custom_fields]
type = "array"
description = "Array of custom field objects"
required = false
