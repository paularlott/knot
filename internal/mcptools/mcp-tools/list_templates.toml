description = "List available space templates to choose from when creating spaces."
keywords = ["templates", "list", "available", "blueprint", "definition"]
discoverable = true

[[parameters]]
name = "show_all"
type = "bool"
description = "Show templates from all zones (default: false, shows only current zone)"
required = false

[[parameters]]
name = "show_inactive"
type = "bool"
description = "Show inactive templates (default: false)"
required = false
