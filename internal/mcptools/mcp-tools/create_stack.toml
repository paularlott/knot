description = "Create a stack of spaces from a stack definition."
keywords = ["create", "stack", "application", "environment", "blueprint", "definition"]
requires_approval = true
discoverable = true

[[parameters]]
name = "definition_name"
type = "string"
description = "Name or ID of the stack definition to instantiate"
required = true

[[parameters]]
name = "prefix"
type = "string"
description = "Prefix used to name the spaces created from the definition"
required = true

[[parameters]]
name = "stack_name"
type = "string"
description = "Optional stack group name. Defaults to the prefix."
required = false

