name = "run_script"
description = "Execute a named script in a running space and capture its output."
keywords = ["run", "execute", "script", "python", "space", "trigger", "invoke"]

[parameters.name]
type = "string"
description = "Name of the space to run the script in"
required = true

[parameters.script]
type = "string"
description = "Name of the script to execute (e.g., 'backup', 'deploy', 'test')"
required = true

[parameters.arguments]
type = "array"
description = "Script arguments as an array (e.g., ['--verbose', 'output.txt'])"
required = false
