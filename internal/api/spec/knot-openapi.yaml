  /api/methods:
    get:
      summary: List Methods
      description: |
        List JSON-RPC methods visible to the current caller.

        Returns the effective callable view of the per-zone method registry,
        not every internal registration. Visibility is based on caller
        identity, group membership, the live registration state, and method
        scope (`private` is only visible to the owning user; `shared` is
        visible to other users with the `use_methods` permission, filtered by
        the method's group list).

        Owners see their bare canonical method names. Other users see shared
        bare canonical names under the `user.<owner>.<method>` namespace.
      tags:
        - Methods
      operationId: listMethods
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  methods:
                    type: array
                    items:
                      $ref: "#/components/schemas/MethodInfo"
        "401":
          $ref: "#/components/responses/unauthorized"
        "500":
          $ref: "#/components/responses/internal-server-error"
      security: [BearerAuth: []]

  /api/methods/call:
    post:
      summary: Call Method
      description: |
        Invoke one or more registered JSON-RPC 2.0 methods. The body may be
        any of:

        - **Single request** — `{"jsonrpc":"2.0","method":"...","params":{},"id":1}`
        - **Batch** — an array of single requests
        - **Notification** — a request without an `id`

        Single requests return a single JSON-RPC response object. Batch
        requests return a JSON array of responses, one per request item that
        carries an `id`. Notifications produce no response entry; if every
        item in a batch is a notification the HTTP response is `204 No
        Content`.

        The server looks up the canonical method name, checks caller
        permissions, rewrites the method name to the method server's
        `local_name`, forwards the call to the owning space's method server,
        and returns the method server's JSON-RPC response. Batches are
        routed per item; items targeting the same destination space may be
        grouped onto a single stream.

        Routing/access failures are returned as JSON-RPC errors with
        HTTP-appropriate status codes: `404` for unknown methods, `403` when
        the method is not visible to the caller, `502` when the method
        server itself fails, and `503` when no live method server is
        available.
      tags:
        - Methods
      operationId: callMethod
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/JSONRPCRequest"
                - type: array
                  items:
                    $ref: "#/components/schemas/JSONRPCRequest"
                  maxItems: 100
              description: |
                A single JSON-RPC 2.0 request, a notification (request
                without `id`), or a batch (array of requests). Batches are
                capped at 100 items.
            examples:
              single:
                summary: Single request
                value:
                  jsonrpc: "2.0"
                  method: "notes.search"
                  params:
                    query: receipt
                  id: 1
              notification:
                summary: Notification (no response expected)
                value:
                  jsonrpc: "2.0"
                  method: "notes.index"
                  params:
                    path: /tmp/notes
              batch:
                summary: Batch request
                value:
                  - jsonrpc: "2.0"
                    method: "notes.search"
                    params:
                      query: receipt
                    id: 1
                  - jsonrpc: "2.0"
                    method: "notes.search"
                    params:
                      query: tax
                    id: 2
      responses:
        "200":
          description: |
            Successful call. For a single request the body is a JSON-RPC
            response object. For a batch the body is an array of JSON-RPC
            response objects (one per request item carrying an `id`).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/JSONRPCResponse"
                  - type: array
                    items:
                      $ref: "#/components/schemas/JSONRPCResponse"
              examples:
                single:
                  summary: Single response
                  value:
                    jsonrpc: "2.0"
                    result:
                      hits:
                        - receipt-2024-06-01.md
                    id: 1
                batch:
                  summary: Batch response
                  value:
                    - jsonrpc: "2.0"
                      result:
                        hits: [receipt-2024-06-01.md]
                      id: 1
                    - jsonrpc: "2.0"
                      error:
                        code: -32601
                        message: "method not found"
                      id: 2
        "204":
          description: |
            No Content. Returned when a single notification is sent, or when
            every item in a batch is a notification.
        "400":
          description: |
            JSON-RPC parse error, missing `method` field, or a batch larger
            than 100 items. The body is a JSON-RPC error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JSONRPCResponse"
        "401":
          $ref: "#/components/responses/unauthorized"
        "403":
          description: |
            Method not visible to caller. The body is a JSON-RPC error
            response with code `-32601`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JSONRPCResponse"
        "404":
          description: |
            Method not found. The body is a JSON-RPC error response with
            code `-32601`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JSONRPCResponse"
        "502":
          description: |
            The method server returned an error or failed. The body is a
            JSON-RPC error response with code `-32000`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JSONRPCResponse"
        "503":
          description: |
            No live method server is available for the requested method. The
            body is a JSON-RPC error response with code `-32000`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JSONRPCResponse"
      security: [BearerAuth: []]

