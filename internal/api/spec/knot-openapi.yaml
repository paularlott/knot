      summary: Create MCP Server
      description: |
        Create a new per-user MCP server configuration. Supports HTTP(S) URL-based
        servers or stdio servers launched as subprocesses. Requires the
        `manage_mcp_servers` permission (bypassed on leaf nodes).
      tags:
        - MCP Servers
      operationId: createMCPServer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MCPServerCreateRequest"
      responses:
        "201":
          description: MCP server created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                  mcp_server_id:
                    type: string
                    format: uuid
        "400":
          $ref: "#/components/responses/bad-request"
        "401":
          $ref: "#/components/responses/unauthorized"
        "403":
          $ref: "#/components/responses/forbidden"
        "409":
          description: MCP server with this namespace already exists for the user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
        "500":
          $ref: "#/components/responses/internal-server-error"
      security: [BearerAuth: []]

  /api/mcp-servers/{mcp_server_id}:
    get:
      summary: Get MCP Server
      description: Get details of a specific MCP server configuration by ID.
      tags:
        - MCP Servers
      operationId: getMCPServer
      parameters:
        - in: path
          name: mcp_server_id
          schema:
            type: string
            format: uuid
          required: true
          description: The MCP server ID.
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MCPServerDetails"
        "401":
          $ref: "#/components/responses/unauthorized"
        "403":
          $ref: "#/components/responses/forbidden"
        "404":
          $ref: "#/components/responses/not-found"
        "500":
          $ref: "#/components/responses/internal-server-error"
      security: [BearerAuth: []]
    put:
      summary: Update MCP Server
      description: Update an existing MCP server configuration. Cannot update managed servers.
      tags:
        - MCP Servers
      operationId: updateMCPServer
      parameters:
        - in: path
          name: mcp_server_id
          schema:
            type: string
            format: uuid
          required: true
          description: The MCP server ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MCPServerUpdateRequest"
      responses:
        "200":
          description: MCP server updated successfully
        "400":
          $ref: "#/components/responses/bad-request"
        "401":
          $ref: "#/components/responses/unauthorized"
        "403":
          $ref: "#/components/responses/forbidden"
        "404":
          $ref: "#/components/responses/not-found"
        "409":
          description: MCP server with this namespace already exists for the user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
        "500":
          $ref: "#/components/responses/internal-server-error"
      security: [BearerAuth: []]
    delete:
      summary: Delete MCP Server
      description: Soft delete an MCP server configuration. Cannot delete managed servers.
      tags:
        - MCP Servers
      operationId: deleteMCPServer
      parameters:
        - in: path
          name: mcp_server_id
          schema:
            type: string
            format: uuid
          required: true
          description: The MCP server ID.
      responses:
        "200":
          description: MCP server deleted successfully
        "401":
          $ref: "#/components/responses/unauthorized"
        "403":
          $ref: "#/components/responses/forbidden"
        "404":
          $ref: "#/components/responses/not-found"
        "500":
          $ref: "#/components/responses/internal-server-error"
      security: [BearerAuth: []]

  /api/mcp-servers/{mcp_server_id}/toggle-tool:
    post:
      summary: Toggle Tool Enabled State
      description: |
        Enable or disable a specific tool within an MCP server configuration.
        Disabled tools are not listed or callable. This updates the
        `disabled_tools` list on the server config.
      tags:
        - MCP Servers
      operationId: toggleMCPServerTool
      parameters:
        - in: path
          name: mcp_server_id
          schema:
            type: string
            format: uuid
          required: true
          description: The MCP server ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tool_name
                - enabled
              properties:
                tool_name:
                  type: string
                  description: Name of the tool to toggle (without namespace prefix).
                enabled:
                  type: boolean
                  description: True to enable the tool, false to disable it.
      responses:
        "200":
          description: Tool toggle successful
        "400":
          $ref: "#/components/responses/bad-request"
        "401":
          $ref: "#/components/responses/unauthorized"
        "403":
          $ref: "#/components/responses/forbidden"
        "404":
          $ref: "#/components/responses/not-found"
        "500":
          $ref: "#/components/responses/internal-server-error"
      security: [BearerAuth: []]

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
  schemas:
    error:
      type: object
      properties:
        error:
          type: string
          description: Error message

    StackDefinitionComponent:
      type: object
      properties:
        name:
          type: string
          description: Space name used for naming and references
        template_id:
          type: string
          description: Template ID to use for this space
        description:
          type: string
          description: Component description
        shell:
          type: string
          description: Override shell
        startup_script_id:
          type: string
          description: Startup script ID
        depends_on:
          type: array
          items:
            type: string
          description: List of component keys this depends on
        custom_fields:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              value:
                type: string
          description: Custom field values
        port_forwards:
          type: array
          items:
            type: object
            properties:
              to_space:
                type: string
              local_port:
                type: integer
              remote_port:
                type: integer
          description: Port forward rules

    OAuthAuthorizationServerMetadata:
      type: object
      description: RFC 8414 OAuth 2.0 Authorization Server Metadata.
      properties:
        issuer:
          type: string
          description: The server's issuer URL.
        authorization_endpoint:
          type: string
          description: URL of the OAuth 2.0 authorization endpoint.
        token_endpoint:
          type: string
          description: URL of the OAuth 2.0 token endpoint.
        response_types_supported:
          type: array
          items:
            type: string
          description: Supported OAuth 2.0 response_type values (e.g. "code").
        grant_types_supported:
          type: array
          items:
            type: string
          description: Supported OAuth 2.0 grant types (e.g. "authorization_code", "refresh_token").
        token_endpoint_auth_methods_supported:
          type: array
          items:
            type: string
          description: Supported client authentication methods for the token endpoint.

    WebhookConfig:
      type: object
      properties:
        url:
          type: string
          description: The webhook target URL.
        secret:
          type: string
          description: HMAC shared secret used to sign webhook deliveries. Masked in list responses; returned plain in a single GET.
        headers:
          type: object
          additionalProperties:
            type: string
          description: Additional HTTP headers sent with the webhook.
        body_template:
          type: string
          description: Template for the webhook request body.
        skip_tls_verify:
          type: boolean
          description: Skip TLS certificate verification when delivering the webhook.

    EventSinkInfo:
      type: object
      properties:
        event_sink_id:
          type: string
          format: uuid
        user_id:
          type: string
          description: Owner user ID (empty for a global sink).
        name:
          type: string
        description:
          type: string
        events:
          type: array
          items:
            type: string
          description: Event-name glob patterns to match (e.g. "*", "foo.*", "foo.bar").
        sink_type:
          type: string
          enum: [webhook, json-rpc, script]
        webhook:
          $ref: "#/components/schemas/WebhookConfig"
        script_id:
          type: string
          description: Script ID for sinks of type "script".
        active:
          type: boolean

    EventSinkDetails:
      allOf:
        - $ref: "#/components/schemas/EventSinkInfo"
        - description: >-
            Same shape as EventSinkInfo, but the webhook secret is returned
            unmasked.

    EventSinkCreateRequest:
      type: object
      required:
        - name
      properties:
        user_id:
          type: string
          description: Owner of the sink. "current" resolves to the caller; empty/omitted creates a global sink.
        name:
          type: string
        description:
          type: string
        events:
          type: array
          items:
            type: string
        sink_type:
          type: string
          enum: [webhook, json-rpc, script]
        webhook:
          $ref: "#/components/schemas/WebhookConfig"
        script_id:
          type: string
        active:
          type: boolean

    EventSinkUpdateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
        events:
          type: array
          items:
            type: string
        sink_type:
          type: string
          enum: [webhook, json-rpc, script]
        webhook:
          $ref: "#/components/schemas/WebhookConfig"
        script_id:
          type: string
        active:
          type: boolean

    EventSinkList:
      type: object
      properties:
        count:
          type: integer
        event_sinks:
          type: array
          items:
            $ref: "#/components/schemas/EventSinkInfo"

    EventSinkCreateResponse:
      type: object
      properties:
        status:
          type: boolean
        event_sink_id:
          type: string
          format: uuid

    EmitEventRequest:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          description: The event type/name to emit.
        payload:
          type: object
          additionalProperties: true
          description: Arbitrary JSON object delivered as the event payload.

    StackDefinition:
      type: object
      properties:
        stack_definition_id:
          type: string
        user_id:
          type: string
          description: Owner user ID (empty for global definitions)
        name:
          type: string
        description:
          type: string
        icon_url:
          type: string
          description: The icon URL for the stack definition or an empty string if there's no icon.
        active:
          type: boolean
        groups:
          type: array
          items:
            type: string
          description: Group IDs allowed to create instances
        zones:
          type: array
          items:
            type: string
          description: Zone restrictions
        components:
          type: array
          items:
            $ref: "#/components/schemas/StackDefinitionComponent"
        is_managed:
          type: boolean
          description: Whether managed by a parent server

    StackDefinitionRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        icon_url:
          type: string
          description: The icon URL for the stack definition or an empty string if there's no icon.
        active:
          type: boolean
        scope:
          type: string
          enum: [user, global]
        groups:
          type: array
          items:
            type: string
        zones:
          type: array
          items:
            type: string
        components:
          type: array
          items:
            $ref: "#/components/schemas/StackDefinitionComponent"

    StackDefinitionValidationResponse:
      type: object
      properties:
        valid:
          type: boolean
          description: Whether the definition passed all validation checks
        errors:
          type: array
          items:
            $ref: "#/components/schemas/StackValidationError"
          description: List of validation errors (empty when valid is true)

    StackValidationError:
      type: object
      properties:
        field:
          type: string
          description: The field that failed validation
        message:
          type: string
          description: Human-readable error description
        space:
          type: string
          description: Space name, if the error relates to a specific space

    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant, system, tool]
          description: The role of the message sender
        content:
          type: string
          description: The content of the message
        tool_calls:
          type: array
          items:
            $ref: "#/components/schemas/ToolCall"
          description: Tool calls made in this message
        tool_call_id:
          type: string
          description: ID of the tool call this message responds to

    ChatCompletionResponse:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the chat completion
        object:
          type: string
          example: "chat.completion"
        created:
          type: integer
          description: Creation timestamp
        model:
          type: string
          description: Model used for the completion
        choices:
          type: array
          items:
            $ref: "#/components/schemas/Choice"
        usage:
          $ref: "#/components/schemas/Usage"

    Choice:
      type: object
      properties:
        index:
          type: integer
          description: Index of the choice
        message:
          $ref: "#/components/schemas/Message"
        delta:
          $ref: "#/components/schemas/Delta"
        finish_reason:
          type: string
          description: Reason for completion (stop, length, tool_calls, etc.)

    Message:
      type: object
      properties:
        role:
          type: string
          description: Message role
        content:
          type: string
          description: Message content
        tool_calls:
          type: array
          items:
            $ref: "#/components/schemas/ToolCall"

    Delta:
      type: object
      properties:
        role:
          type: string
          description: Message role
        content:
          type: string
          description: Message content delta
        reasoning_content:
          type: string
          description: Reasoning/thinking content
        tool_calls:
          type: array
          items:
            $ref: "#/components/schemas/DeltaToolCall"

    ToolCall:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the tool call
        type:
          type: string
          description: Type of the tool call (function)
        function:
          $ref: "#/components/schemas/ToolCallFunction"
        index:
          type: integer
          description: Index of the tool call

    DeltaToolCall:
      type: object
      properties:
        index:
          type: integer
          description: Index of the tool call
        id:
          type: string
          description: Unique identifier for the tool call
        type:
          type: string
          description: Type of the tool call
        function:
          $ref: "#/components/schemas/DeltaFunction"

    ToolCallFunction:
      type: object
      properties:
        name:
          type: string
          description: Name of the function to call
        arguments:
          type: object
          additionalProperties: true
          description: Arguments to pass to the function

    DeltaFunction:
      type: object
      properties:
        name:
          type: string
          description: Name of the function
        arguments:
          type: string
          description: Partial arguments string (streamed)

    Tool:
      type: object
      properties:
        type:
          type: string
          example: "function"
        function:
          type: object
          properties:
            name:
              type: string
              description: Function name
            description:
              type: string
              description: Function description
            parameters:
              type: object
              description: JSON Schema for function parameters

    Usage:
      type: object
      properties:
        prompt_tokens:
          type: integer
          description: Number of tokens in the prompt
        completion_tokens:
          type: integer
          description: Number of tokens in the completion
        total_tokens:
          type: integer
          description: Total number of tokens

    AuthLoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: user@example.com
          description: The email address of the user
        password:
          type: string
          example: password
          description: The password of the user
        totp_code:
          type: string
          example: "123456"
          description: The TOTP code for the user, ignored if TOTP is not enabled.
      required:
        - email
        - password

    AuthLoginResponse:
      type: object
      properties:
        status:
          type: boolean
          description: The status of the operation, true if successful login.
        token:
          type: string
          description: The token for the user session.
        totp_secret:
          type: string
          description: The TOTP secret for the user, if set then the code needs to be provided to the user as 1st login enables TOTP.

    AuthLogoutResponse:
      type: object
      properties:
        status:
          type: boolean
          description: The status of the operation, true if successful logout.

    PermissionInfo:
      type: object
      properties:
        id:
          type: integer
          description: The ID of the permission.
        name:
          type: string
          description: The name of the permission.
        group:
          type: string
          description: The group of the permission.

    Icon:
      type: object
      properties:
        description:
          type: string
          description: The description of the icon.
        source:
          type: string
          description: The source of the icon.
        url:
          type: string
          format: uri
          description: The URL of the icon.

    PermissionInfoList:
      type: object
      properties:
        count:
          type: integer
          example: 1
          description: The total number of permissions.
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/PermissionInfo"

    GroupInfo:
      type: object
      properties:
        group_id:
          type: string
          format: uuid
          description: The ID of the group.
        name:
          type: string
          description: The name of the group.
        max_spaces:
          type: integer
          format: uint32
          description: The maximum number of spaces the group members can have.
        compute_units:
          type: integer
          format: uint32
          description: The number of compute units the group members get.
        storage_units:
          type: integer
          format: uint32
          description: The number of storage units the group members get.
        max_tunnels:
          type: integer
          format: uint32
          description: The maximum number of tunnels the group members can have.

    GroupInfoList:
      type: object
      properties:
        count:
          type: integer
          example: 1
          description: The total number of groups.
        groups:
          type: array
          items:
            $ref: "#/components/schemas/GroupInfo"

    GroupRequest:
      type: object
      properties:
        name:
          type: string
          example: "my group"
          maxLength: 64
          description: The name of the group.
        max_spaces:
          type: integer
          format: uint32
          description: The maximum number of spaces the group members can have.
        compute_units:
          type: integer
          format: uint32
          description: The number of compute units the group members get.
        storage_units:
          type: integer
          format: uint32
          description: The number of storage units the group members get.
        max_tunnels:
          type: integer
          format: uint32
          description: The maximum number of tunnels the group members can have.

    GroupResponse:
      type: object
      properties:
        status:
          type: boolean
          description: The status of the operation, true if successful.
        group_id:
          type: string
          format: uuid
          description: The ID of the group.

    RoleDetails:
      type: object
      properties:
        role_id:
          type: string
          format: uuid
          description: The ID of the role.
        name:
          type: string
          description: The name of the role.
        permissions:
          type: array
          items:
            type: integer
          description: The permissions of the role.

    RoleRequest:
      type: object
      properties:
        name:
          type: string
          example: "my role"
          maxLength: 64
          description: The name of the role.
        permissions:
          type: array
          items:
            type: integer
          description: The permissions of the role.

    RoleResponse:
      type: object
      properties:
        status:
          type: boolean
          description: The status of the operation, true if successful.
        role_id:
          type: string
          format: uuid
          description: The ID of the role.

    PingResponse:
      type: object
      properties:
        status:
          type: boolean
          description: True if the server is healthy.
        version:
          type: string
          example: 1.0.0
          description: The server version string.
        zone:
          type: string
          example: default
          description: The server zone name.

    ServerInfoResponse:
      type: object
      properties:
        version:
          type: string
          example: "0.26.0"
          description: The knot server version string.
        wildcard_domain:
          type: string
          example: "*.knot.example.com"
          description: The server's wildcard domain used to build space web-port URLs. Empty when not configured.

    AuditLogEntry:
      type: object
      properties:
        audit_log_id:
          type: integer
          format: int64
          description: The ID of the audit log entry.
        zone:
          type: string
          description: The server zone of the audit log entry.
        actor:
          type: string
          description: The actor who performed the action.
        actor_type:
          type: string
          description: The type of the actor.
        event:
          type: string
          description: The event that occurred.
        when:
          type: string
          format: date-time
          description: The time when the event occurred.
        details:
          type: string
          description: Additional details about the event.
        properties:
          type: object
          additionalProperties: true
          description: Additional properties related to the event.

    AuditLogs:
      type: object
      properties:
        count:
          type: integer
          description: The total number of audit logs.
        items:
          type: array
          items:
            $ref: "#/components/schemas/AuditLogEntry"

    ClusterNodeInfo:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: The ID of the cluster node.
        address:
          type: string
          description: The advertised address of the cluster node.
        state:
          enum: [Alive, Suspect, Leaving, Dead]
          description: The human readable state of the cluster node.
        metadata:
          type: object
          additionalProperties:
            type: string
          description: The metadata of the cluster node as key-value pairs.

    TunnelInfo:
      type: object
      properties:
        name:
          type: string
          description: The name of the tunnel.
        address:
          type: string
          description: The address of the tunnel.

    SessionResponse:
      type: object
      properties:
        session_id:
          type: string
          description: The ID of the session.
        ip:
          type: string
          description: The IP address of the session.
        user_agent:
          type: string
          description: The user agent of the session.
        expires_at:
          type: string
          format: date-time
          description: The expiration time of the session.
        current:
          type: boolean
          description: True if the session is the current session.

    SpaceInfo:
      type: object
      properties:
        space_id:
          type: string
          format: uuid
          description: The ID of the space.
        name:
          type: string
          description: The name of the space.
        description:
          type: string
          description: The description of the space.
        note:
          type: string
          description: The note set by the space itself.
        template_name:
          type: string
          description: The name of the template the space was created from.
        template_id:
          type: string
          format: uuid
          description: The ID of the template the space was created from.
        zone:
          type: string
          description: The zone of the space.
        username:
          type: string
          description: The username of the user the space belongs to.
        user_id:
          type: string
          format: uuid
          description: The ID or username of the user the space belongs to.
        platform:
          type: string
          description: The container platform to run the template on.
          enum: ["manual", "docker", "podman", "nomad", "apple", "container"]
        shares:
          type: array
          description: The users the space is shared with.
          items:
            type: string
            description: The UUID of a shared user.
        depends_on:
          type: array
          description: The IDs of spaces that must already be running before this space can start.
          items:
            type: string
            format: uuid
        has_code_server:
          type: boolean
          description: If the space has a running code server.
        has_ssh:
          type: boolean
          description: If the space has a running SSH server.
        has_http_vnc:
          type: boolean
          description: If the space has a running HTTP VNC server.
        has_terminal:
          type: boolean
          description: If the space can support a web terminal.
        has_vscode_tunnel:
          type: boolean
          description: If the space has a running VSCode tunnel.
        vscode_tunnel_name:
          type: string
          description: The name of the VSCode tunnel.
        is_deployed:
          type: boolean
          description: If the space is deployed.
        is_pending:
          type: boolean
          description: If the space is pending a state change.
        is_deleting:
          type: boolean
          description: If the space is being deleted.
        tcp_ports:
          type: object
          additionalProperties:
            type: string
          description: A list of the available TCP ports exposed by the space.
        http_ports:
          type: object
          additionalProperties:
            type: string
          description: A list of the available HTTP ports exposed by the space.
        update_available:
          type: boolean
          description: If an update is available for the space.
        is_remote:
          type: boolean
          description: Flags if the space is on a server other than the current one.
        has_state:
          type: boolean
