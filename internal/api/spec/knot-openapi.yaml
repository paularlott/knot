          type: string
          description: URL (http), port number (tcp), command (program), or script content (custom).
        health_check_skip_ssl_verify:
          type: boolean
          description: Skip SSL certificate verification (http only).
        health_check_timeout:
          type: integer
          format: uint32
          default: 10
