openapi: 3.0.3
servers:
  - url: https://127.0.0.1
    description: Local server.
info:
  version: 1.0.0
  title: Knot API
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  x-logo:
    url: ../images/logo-light.svg
  description: |
    # Introduction
    The REST API is used for the CLI, Web interface and 3rd party integrations.
tags:
  - name: Authorization
    description: |
      This API is authenticated using a bearer token. The token is passed in the Authorization header as a Bearer token.

      A token can be obtained by logging in with the login endpoint and providing a valid username and password, or by creating a token with the create token endpoint.
  - name: OpenAI
    description: |
      OpenAI-compatible endpoints for AI chat functionality.
  - name: Tokens
    description: |
      Operations for working with API tokens.
  - name: Core
    description: |
      Core API endpoints.
  - name: Spaces
    description: |
      Endpoints for working with spaces.
  - name: Pools
    description: |
      Endpoints for fixed-size space pools and utilization stats.
  - name: Users
    description: |
      These operations are for working with users.
  - name: Scripts
    description: |
      Operations for working with scripts and MCP tools.
  - name: Skills
    description: |
      Operations for working with skills (knowledge base content).
  - name: Methods
    description: |
      Operations for discovering and calling space-registered JSON-RPC methods.
  - name: Stack Definitions
    description: |
      Operations for working with stack definitions (reusable space blueprints).
  - name: MCP Servers
    description: |
      Operations for working with per-user MCP (Model Context Protocol) server configurations.
      MCP servers provide tools to AI assistants. Each user can configure their own set of
      HTTP(S) or stdio MCP servers with native or discoverable tool visibility.
paths:
  /v1/models:
    get:
      tags:
        - OpenAI
      summary: List Models
      description: List the available AI models.
      operationId: listModels
      responses:
        "200":
          description: Successful response with model list
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    example: "list"
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Model identifier
                        created:
                          type: integer
                          description: Creation timestamp
                        object:
                          type: string
                          example: "model"
                        owned_by:
                          type: string
                          example: "knot"
        "401":
          $ref: "#/components/responses/unauthorized"
      security: [BearerAuth: []]

  /v1/chat/completions:
    post:
      tags:
        - OpenAI
      summary: Chat Completions
      description: Create a chat completion with streaming support and tool calling.
      operationId: chatCompletions
      parameters:
        - name: X-Knot-Api-Version
          in: header
          required: false
          schema:
            type: string
            default: "2025-03-10"
          description: API version
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                messages:
                  type: array
                  items:
                    $ref: "#/components/schemas/ChatMessage"
                model:
                  type: string
                  description: Model to use (empty string uses default)
                stream:
                  type: boolean
                  description: Whether to stream responses
                  default: true
                tools:
                  type: array
                  items:
                    $ref: "#/components/schemas/Tool"
                  description: List of tools available to the model
              required:
                - messages
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletionResponse"
            text/event-stream:
               schema:
                 type: string
                 description: Server-Sent Events stream with tool status events
        "400":
          $ref: "#/components/responses/bad-request"
        "401":
          $ref: "#/components/responses/unauthorized"
      security: [BearerAuth: []]

  /api/auth/using-totp:
    get:
      tags:
        - Authorization
      summary: Get if Using TOTP
      description: Check if the server has TOTP enabled or not.
      operationId: getUsingTOTP
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  using_totp:
                    type: boolean
                    description: True if TOTP is enabled.
      security: []

  /api/audit-logs:
    get:
      tags:
        - Audit Logs
      summary: Get Audit Logs
      description: Retrieve the audit logs with optional filtering.
      operationId: getAuditLogs
      parameters:
        - name: start
          in: query
          description: The item to start at.
          required: false
          schema:
            type: integer
            format: int32
        - name: max-items
          in: query
          description: The maximum number of items to return.
          required: false
          schema:
            type: integer
            format: int32
            default: 10
        - name: q
          in: query
          description: Full-text search across actor, event, and details.
          required: false
          schema:
            type: string
        - name: actor
          in: query
          description: Filter by actor name (exact match).
          required: false
          schema:
            type: string
        - name: actor_type
          in: query
          description: Filter by actor type (User, System, MCP).
          required: false
          schema:
            type: string
        - name: event
          in: query
          description: Filter by event type (exact match).
          required: false
          schema:
            type: string
        - name: from
          in: query
          description: Start of date range (RFC3339).
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: End of date range (RFC3339).
          required: false
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: A list of audited operations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogs"
        "401":
          $ref: "#/components/responses/unauthorized"
        "500":
          $ref: "#/components/responses/internal-server-error"
      security: [BearerAuth: []]

  /api/audit-logs/export:
    get:
      tags:
        - Audit Logs
      summary: Export Audit Logs
      description: |
        Export audit logs as a downloadable file (CSV by default, or JSON).

        Requires the download audit logs permission (distinct from the
        read-only view permission used by the list endpoint).
      operationId: exportAuditLogs
      parameters:
        - name: q
          in: query
          description: Full-text search across actor, event, and details.
          required: false
          schema:
            type: string
        - name: actor
          in: query
          description: Filter by actor name (exact match).
          required: false
          schema:
            type: string
        - name: actor_type
          in: query
          description: Filter by actor type (User, System, MCP).
          required: false
          schema:
            type: string
        - name: event
          in: query
          description: Filter by event type (exact match).
          required: false
          schema:
            type: string
        - name: from
          in: query
          description: Start of date range (RFC3339).
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: End of date range (RFC3339).
          required: false
          schema:
            type: string
            format: date-time
        - name: format
          in: query
          description: "Export format: `json` for a JSON file, otherwise (default) CSV."
          required: false
          schema:
            type: string
            enum: [csv, json]
            default: csv
      responses:
        "200":
          description: Audit log export file.
          headers:
            Content-Disposition:
              schema:
                type: string
              description: attachment; filename="audit-logs.csv" or "audit-logs.json"
          content:
            text/csv:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLogEntry"
        "401":
          $ref: "#/components/responses/unauthorized"
        "403":
          $ref: "#/components/responses/forbidden"
        "500":
          $ref: "#/components/responses/internal-server-error"
      security: [BearerAuth: []]

  /api/cluster-info:
    get:
      tags:
        - Cluster
      summary: Get Cluster Info
      description: Retrieve an overview of the cluster.
      operationId: getClusterInfo
      responses:
        "200":
          description: A list of cluster nodes.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClusterNodeInfo"
        "401":
          $ref: "#/components/responses/unauthorized"
        "500":
          $ref: "#/components/responses/internal-server-error"
      security: [BearerAuth: []]

  /api/cluster/node:
    get:
      tags:
        - Cluster
      summary: Get Cluster Node Status
      description: |
        Returns information about the current cluster node.

        This endpoint is used internally by cluster nodes to report their status.
        It requires cluster authentication via the X-Cluster-Key header.
      operationId: getClusterNode
      responses:
        "200":
          description: Node status information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClusterNodeInfo"
        "401":
          description: Invalid or missing cluster key
      security: []
      x-internal: true

  /api/events:
    get:
      tags:
        - Events
      summary: Server-Sent Events Stream
      description: |
        Establishes a Server-Sent Events (SSE) connection for real-time updates.

        This endpoint provides a continuous stream of events for the authenticated user,
        including space changes, session updates, and other system events.

        The connection requires authentication and will remain open as long as the client
        maintains the connection. Events are sent as JSON data with event types.

        **Event Types:**
        - `connected` - Initial connection confirmation
        - `message` - JSON data containing event information

        **Reconnecting:**
        Clients should implement automatic reconnection with exponential backoff
        if the connection is lost.
      operationId: events
      responses:
        "200":
          description: SSE stream established successfully
          content:
            text/event-stream:
              schema:
                type: string
                description: Server-Sent Events stream with JSON event data
              example: |
                event: connected
                data: {"status":"ok"}

                event: message
                data: {"type":"space_changed","space_id":"..."}
        "401":
          $ref: "#/components/responses/unauthorized"
      security: [BearerAuth: []]

  /api/tunnels/{tunnel_name}:
    delete:
      tags:
        - Tunnels
      summary: Delete Tunnel
      description: Delete a specific tunnel for the authenticated user.
      operationId: deleteTunnel
      parameters:
        - name: tunnel_name
          in: path
          required: true
          description: The name of the tunnel to delete.
          schema:
            type: string
      responses:
        "200":
          description: Tunnel deleted successfully.
        "401":
          $ref: "#/components/responses/unauthorized"
        "404":
          $ref: "#/components/responses/not-found"
        "500":
          $ref: "#/components/responses/internal-server-error"
      security: [BearerAuth: []]

  /api/tunnels:
    get:
      tags:
        - Tunnels
      summary: Get Tunnels
      description: Retrieve all tunnels for the authenticated user.
      operationId: getTunnels
      responses:
        "200":
          description: A list of tunnels.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TunnelInfo"
        "401":
          $ref: "#/components/responses/unauthorized"
        "500":
          $ref: "#/components/responses/internal-server-error"
      security: [BearerAuth: []]

  /api/tunnels/server-info:
    get:
      tags:
        - Tunnels
      summary: Get Tunnel Server Info
      description: Retrieve the server information used for tunnels.
      operationId: getTunnelServerInfo
      responses:
        "200":
          description: The server information.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TunnelServerInfo"
        "401":
          $ref: "#/components/responses/unauthorized"
        "500":
          $ref: "#/components/responses/internal-server-error"
      security: [BearerAuth: []]

  /api/users:
    post:
      tags:
        - Users
      summary: Create User
      description: |
        Create a new user.

        Only admin users can create users.
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    description: True if the user was created.
                  user_id:
                    type: string
                    format: uuid
                    description: The ID or username of the user.
        "400":
          $ref: "#/components/responses/bad-request"
        "401":
          $ref: "#/components/responses/unauthorized"
        "403":
          $ref: "#/components/responses/forbidden"
      security: [BearerAuth: []]

    get:
      tags:
        - Users
      summary: Get Users
      description: Get the list of users within the system.
      operationId: listUsers
      parameters:
        - name: state
          in: query
          description: The sate of users to return
          required: false
          schema:
            type: string
            enum:
              - active
              - inactive
              - all
            default: all
        - name: zone
          in: query
          description: If given tracks the number of spaces the user has deployed in the given zone.
          required: false
          schema:
            type: string
        - name: local
          in: query
          description: If given and true then only users that have logged into a leaf node at least once will be returned.
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: A list of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                    description: The total number of users
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserInfo"
        "400":
          $ref: "#/components/responses/bad-request"
        "401":
          $ref: "#/components/responses/unauthorized"
        "403":
          $ref: "#/components/responses/forbidden"
        "500":
          $ref: "#/components/responses/internal-server-error"
      security: [BearerAuth: []]

  /api/users/{user_id}:
    get:
      tags:
        - Users
      summary: Get a User
      operationId: getUser
      parameters:
        - name: user_id
          in: path
          required: true
          description: The ID or username of the user to get.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: A user object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/bad-request"
        "401":
          $ref: "#/components/responses/unauthorized"
        "403":
          $ref: "#/components/responses/forbidden"
        "404":
          $ref: "#/components/responses/not-found"
      security: [BearerAuth: []]

    put:
      tags:
        - Users
      summary: Update User
      description: Update the user data.
      operationId: updateUser
      parameters:
        - name: user_id
          in: path
          required: true
          description: The ID or username of the user
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated successfully
        "400":
          $ref: "#/components/responses/bad-request"
        "401":
          $ref: "#/components/responses/unauthorized"
        "403":
          $ref: "#/components/responses/forbidden"
        "404":
          $ref: "#/components/responses/not-found"
      security: [BearerAuth: []]

    delete:
      summary: Delete User
      description: Delete a user, a user can't delete themselves.
      tags:
        - Users
      operationId: deleteUser
      parameters:
        - in: path
          name: user_id
          schema:
            type: string
            format: uuid
          required: true
          description: The ID or username of the user to delete.
      responses:
        "200":
          description: Successful operation.
        "401":
          $ref: "#/components/responses/unauthorized"
        "403":
          $ref: "#/components/responses/forbidden"
        "404":
          $ref: "#/components/responses/not-found"
        "500":
          $ref: "#/components/responses/internal-server-error"
      security: [BearerAuth: []]

  /api/users/{user_id}/quota:
    get:
      tags:
        - Users
      summary: Get User Quota
      operationId: getUserQuota
      parameters:
        - name: user_id
          in: path
          required: true
          description: The ID or username of the user to get the quota for.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: A user object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserQuota"
        "400":
          $ref: "#/components/responses/bad-request"
        "401":
          $ref: "#/components/responses/unauthorized"
        "403":
          $ref: "#/components/responses/forbidden"
        "404":
          $ref: "#/components/responses/not-found"
      security: [BearerAuth: []]

  /api/users/{user_id}/permissions:
    get:
      tags:
        - Users
      summary: Get User Permissions
      description: Retrieve all permissions for a user, resolved from their roles.
      operationId: getUserPermissions
      parameters:
        - name: user_id
          in: path
          required: true
          description: The ID or username of the user to get permissions for.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: A list of permission IDs
          content:
            application/json:
              schema:
                type: object
                properties:
                  permissions:
                    type: array
                    items:
                      type: integer
                    description: The list of permission IDs the user has.
        "400":
          $ref: "#/components/responses/bad-request"
        "401":
          $ref: "#/components/responses/unauthorized"
        "403":
          $ref: "#/components/responses/forbidden"
        "404":
          $ref: "#/components/responses/not-found"
      security: [BearerAuth: []]

  /api/users/{user_id}/has-permission:
    get:
      tags:
        - Users
      summary: Check User Permission
      description: Check if a user has a specific permission.
      operationId: getUserHasPermission
      parameters:
        - name: user_id
          in: path
          required: true
          description: The ID or username of the user to check permissions for.
          schema:
            type: string
            format: uuid
        - name: permission
          in: query
          required: true
          description: The permission ID to check (integer).
          schema:
            type: integer
      responses:
        "200":
          description: Permission check result
          content:
            application/json:
              schema:
                type: object
                properties:
                  has_permission:
                    type: boolean
                    description: True if the user has the permission.
        "400":
          $ref: "#/components/responses/bad-request"
        "401":
          $ref: "#/components/responses/unauthorized"
        "403":
          $ref: "#/components/responses/forbidden"
        "404":
          $ref: "#/components/responses/not-found"
      security: [BearerAuth: []]

  /api/users/whoami:
    get:
      tags:
        - Users
      summary: Get Logged In User
      operationId: getWhoAmI
      responses:
        "200":
          description: A user object for the currently authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/bad-request"
        "401":
          $ref: "#/components/responses/unauthorized"
      security: [BearerAuth: []]

  /api/users/whoami/ssh-public-key:
    put:
      tags:
        - Users
      summary: Update Own SSH Public Keys
      description: Update the current user's SSH public keys. Multiple public keys should be provided one per line.
      operationId: updateOwnSSHPublicKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOwnSSHPublicKeyRequest"
      responses:
        "200":
          description: SSH public keys updated successfully
        "400":
          $ref: "#/components/responses/bad-request"
        "401":
          $ref: "#/components/responses/unauthorized"
      security: [BearerAuth: []]

  /api/users/whoami/ssh-private-key:
    put:
      tags:
        - Users
      summary: Update Own SSH Private Key
      description: Update the current user's SSH private key. The key is written to `~/.ssh/id_ed25519` or `~/.ssh/id_rsa` in SSH-enabled spaces depending on key format.
      operationId: updateOwnSSHPrivateKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOwnSSHPrivateKeyRequest"
      responses:
        "200":
          description: SSH private key updated successfully
        "400":
          $ref: "#/components/responses/bad-request"
        "401":
          $ref: "#/components/responses/unauthorized"
      security: [BearerAuth: []]

  /api/permissions:
    get:
      summary: Get Permissions
      description: Retrieve all permissions.
      operationId: getPermissions
      tags:
        - Permissions
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PermissionInfoList"
        "401":
          $ref: "#/components/responses/unauthorized"
        "500":
          $ref: "#/components/responses/internal-server-error"
      security: [BearerAuth: []]

  /api/icons:
    get:
      summary: Get Icons
      description: Retrieve all available icons with descriptions and URLs.
      operationId: getIcons
      tags:
        - Core
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Icon"
        "401":
          $ref: "#/components/responses/unauthorized"
        "500":
          $ref: "#/components/responses/internal-server-error"
      security: [BearerAuth: []]

  /api/groups:
    get:
      summary: Get Groups
      description: Retrieve all groups.
      operationId: getGroups
      tags:
        - Groups
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupInfoList"
        "401":
          $ref: "#/components/responses/unauthorized"
        "500":
          $ref: "#/components/responses/internal-server-error"
      security: [BearerAuth: []]

    post:
      summary: Create a Group
      description: Create a new group.
      operationId: createGroup
      tags:
        - Groups
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupRequest"
      responses:
        "201":
          description: Group created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupResponse"
        "400":
          $ref: "#/components/responses/bad-request"
        "401":
          $ref: "#/components/responses/unauthorized"
        "403":
          $ref: "#/components/responses/forbidden"
      security: [BearerAuth: []]

  /api/groups/{group_id}:
    put:
      summary: Update a Group
      description: Update a group.
      operationId: updateGroup
      tags:
        - Groups
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
            description: The ID of the group to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupRequest"
      responses:
        "200":
          description: Successful operation
        "400":
          $ref: "#/components/responses/bad-request"
        "401":
          $ref: "#/components/responses/unauthorized"
        "403":
          $ref: "#/components/responses/forbidden"
        "404":
          $ref: "#/components/responses/not-found"
        "500":
          $ref: "#/components/responses/internal-server-error"
      security: [BearerAuth: []]

    delete:
      summary: Delete Group
      description: Delete a specified group.
      tags:
        - Groups
      operationId: deleteGroup
      parameters:
        - in: path
          name: group_id
          schema:
            type: string
            format: uuid
          required: true
          description: The ID of the group to delete.
      responses:
        "200":
          description: Successful operation.
        "401":
          $ref: "#/components/responses/unauthorized"
        "403":
          $ref: "#/components/responses/forbidden"
        "404":
