          type: array
          items:
            type: string
            format: uuid
          description: Group IDs that can access this script. Only applies to global scripts. User scripts cannot have groups.
        zones:
          type: array
          items:
            type: string
          description: Zones where this script is available. Empty array means all zones.
        active:
          type: boolean
          default: true
        script_type:
          type: string
          enum: [script, lib, tool]
          default: script
        mcp_input_schema_toml:
          type: string
        mcp_keywords:
          type: array
          items:
            type: string

    ScriptUpdateRequest:
      type: object
      required:
        - name
        - content
      properties:
        name:
          type: string
        description:
          type: string
        content:
          type: string
        groups:
          type: array
          items:
            type: string
            format: uuid
          description: Group IDs that can access this script. Only applies to global scripts. User scripts cannot have groups.
        zones:
          type: array
          items:
            type: string
          description: Zones where this script is available. Empty array means all zones.
        active:
          type: boolean
        script_type:
          type: string
          enum: [script, lib, tool]
        mcp_input_schema_toml:
          type: string
        mcp_keywords:
          type: array
          items:
            type: string

    MethodInfo:
      type: object
      description: |
        A JSON-RPC method visible to the caller. Returned by
        `GET /api/methods`.

        The `name` is the effective visible name for the caller: owners see
        the bare canonical name, while other users see shared bare names
        under the `user.<owner>.<method>` namespace.
      properties:
        name:
          type: string
          description: Canonical method name as visible to this caller.
        local_name:
          type: string
          description: |
            Method name forwarded to the method server. This is metadata
            for callers; the server rewrites the JSON-RPC `method` field to
            this value before forwarding.
        description:
          type: string
          description: Human-readable description from the registration.
        keywords:
          type: array
          items:
            type: string
          description: Optional search/metadata keywords.
        scope:
          type: string
          enum: [private, shared]
          description: Visibility scope of the method.
        groups:
          type: array
          items:
            type: string
            format: uuid
          description: |
            Group IDs allowed to discover and call this method. Only
            applies to `shared` methods. An empty list means all
            authenticated users in the zone with the `use_methods`
            permission.
        mcp_tool:
          type: boolean
          description: |
            `true` when the method is also projected as a discoverable MCP
            tool.
        params_schema:
          type: object
          additionalProperties: true
          description: |
            JSON Schema fragment describing the method's `params`. Pass
            through to callers; the method server owns runtime validation.
        result_schema:
          type: object
          additionalProperties: true
          description: |
            JSON Schema fragment describing the method's result, when
            supplied.
        owner_id:
          type: string
          format: uuid
          description: User ID of the owning space's user.
        owner:
          type: string
          description: Username of the owning space's user.
        provider_count:
          type: integer
          description: |
            Number of distinct spaces currently providing this exact
            method definition. `1` unless duplicate exact-match
            registrations exist.

    JSONRPCRequest:
      type: object
      description: JSON-RPC 2.0 request object.
      required:
        - jsonrpc
        - method
      properties:
        jsonrpc:
          type: string
          default: "2.0"
        method:
          type: string
          description: |
            Canonical JSON-RPC method name as returned by
            `GET /api/methods`.
        params:
          description: |
            Method parameters. May be an object or an array. Omit when the
            method takes no parameters.
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items: {}
        id:
          description: |
            Caller-supplied identifier used to match the response. May be a
            string, number, or `null`. If absent, the request is treated as
            a notification and produces no response entry.

    JSONRPCResponse:
      type: object
      description: JSON-RPC 2.0 response object.
      properties:
        jsonrpc:
          type: string
          default: "2.0"
        result:
          description: Method result. Present on successful responses.
        error:
          $ref: "#/components/schemas/JSONRPCError"
        id:
          description: |
            Echo of the request `id`. `null` when the request could not be
            parsed or matched.

    JSONRPCError:
      type: object
      description: JSON-RPC 2.0 error object.
      properties:
        code:
          type: integer
          description: |
            JSON-RPC error code. Standard protocol codes are used for
            parse/invalid-request errors. Routing and transport failures
            use:

            - `-32601` — method not found or not visible to caller
            - `-32000` — method server error, transport failure, or no
              live method server available
        message:
          type: string

