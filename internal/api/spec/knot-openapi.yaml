        The command is executed synchronously and will wait for completion or timeout.

        **Note:** This is different from `execute-script` which runs named scripts.
        This endpoint runs arbitrary shell commands directly.
      operationId: runCommand
      parameters:
        - name: space_id
          in: path
          required: true
          schema:
            type: string
          description: The ID or name of the space.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - command
              properties:
                command:
                  type: string
                  description: The command to execute.
                args:
                  type: array
                  items:
                    type: string
                  description: Command arguments.
                timeout:
                  type: integer
                  default: 30
                  description: Timeout in seconds.
                workdir:
                  type: string
                  description: Working directory for the command.
            example:
              command: "ls"
              args: ["-la", "/tmp"]
              timeout: 30
      responses:
        "200":
          description: Command executed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: True if the command succeeded
                  output:
                    type: string
                    description: The command output (stdout + stderr)
                  error:
                    type: string
                    description: Error message if the command failed
        "400":
          $ref: "#/components/responses/bad-request"
        "401":
          $ref: "#/components/responses/unauthorized"
        "404":
          $ref: "#/components/responses/not-found"
        "500":
          $ref: "#/components/responses/internal-server-error"
      security: [BearerAuth: []]

